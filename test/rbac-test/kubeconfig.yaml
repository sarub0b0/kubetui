apiVersion: v1
kind: Config
clusters:
  - cluster:
      certificate-authority-data: <BASE64_CA_CERT>
      server: https://127.0.0.1:6443
    name: test-cluster
contexts:
  - context:
      cluster: test-cluster
      user: kubetui-test-user
      namespace: test-ns-a
    name: test-context
current-context: test-context
users:
  - name: kubetui-test-user
    user:
      token: <TOKEN>
